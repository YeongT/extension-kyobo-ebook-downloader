<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>세션 관리자 - Kyobo eBook PDF</title>
  <link rel="stylesheet" href="sessions.css">
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">K</div>
        <div class="header-text">
          <h1>Kyobo eBook</h1>
          <span class="header-sub">캡처 세션 관리</span>
        </div>
      </div>
      <div class="sidebar-tools">
        <button class="tool-btn" id="importBtn" title="세션 불러오기">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          불러오기
        </button>
        <input type="file" id="importFile" hidden accept=".zip">
      </div>
      <div class="book-list" id="bookList"></div>
    </aside>

    <!-- Main content -->
    <main class="main">
      <div id="emptyState" class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#d2d2d7" stroke-width="1.5"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
        <p>왼쪽에서 도서를 선택하세요</p>
      </div>

      <div id="bookDetail" class="detail" hidden>
        <!-- Header -->
        <div class="detail-header">
          <div class="detail-title-row">
            <h2 id="detailTitle"></h2>
            <div class="title-actions">
              <button class="icon-btn" id="reinspectBtn" title="전체 재검사">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
              </button>
              <button class="icon-btn" id="exportBtn" title="내보내기">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              </button>
              <button class="icon-btn danger" id="deleteBookBtn" title="도서 삭제">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
              </button>
            </div>
          </div>
          <div class="detail-meta" id="detailMeta"></div>
          <div class="detail-progress-row">
            <div class="progress-bar large"><div class="progress-fill" id="detailFill"></div></div>
            <span class="progress-label" id="detailProgress"></span>
          </div>

          <!-- Scan Live Progress (inline, only during active scanning) -->
          <div class="scan-live-row" id="scanCard" hidden>
            <div class="scan-live-text" id="scanLiveText">0/0 (0%)</div>
            <div class="progress-bar large"><div class="progress-fill" id="scanFill"></div></div>
          </div>

          <!-- Viewer status + all actions on one line -->
          <div class="viewer-action-bar" id="viewerActionBar">
            <span class="scan-status" id="scanStatus">
              <span class="scan-dot" id="scanDot"></span>
              <span id="scanStatusText">뷰어 연결 안 됨</span>
            </span>
            <span style="flex:1"></span>
            <button class="bar-btn" id="switchToViewerBtn" title="뷰어로 전환" hidden>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
              뷰어로 전환
            </button>
            <button class="bar-btn" id="openViewerBtn" title="뷰어 열기">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              뷰어 열기
            </button>
            <span class="bar-sep"></span>
            <button class="bar-btn" id="openReaderBtn" title="리더">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
              리더
            </button>
            <span class="bar-sep" id="downloadToolbar"></span>
            <div class="pdf-group" id="pdfGroup">
              <select id="pdfSize" class="select-input">
                <option value="original">원본</option>
                <option value="a4">A4</option>
                <option value="b5">B5</option>
                <option value="a5">A5</option>
              </select>
              <button class="bar-btn primary" id="dlPdf" title="PDF 저장">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                PDF
              </button>
            </div>
          </div>
        </div>

        <!-- TOC + Missing/Suspect -->
        <div class="info-panels" id="tocMissingRow" hidden>
          <div class="info-panels-header collapsible" id="infoPanelsToggle">
            <span id="infoPanelsLabel">목차 · 구간</span>
            <span style="flex:1"></span>
            <span class="collapse-icon" id="infoPanelsIcon">▾</span>
          </div>
          <div class="info-panels-body" id="infoPanelsBody">
            <div class="info-panel toc-panel" id="tocSection" hidden>
              <div class="panel-header">
                <span id="tocLabel">목차</span>
                <span style="flex:1"></span>
                <button class="toc-action-btn" id="tocRescanBtn" title="뷰어에서 목차 재스캔">재스캔</button>
                <button class="toc-action-btn" id="tocEditBtn" title="목차 직접 편집">편집</button>
              </div>
              <div id="tocList" class="toc-list"></div>
            </div>
            <div class="info-panel missing-panel" id="missingSection" hidden>
              <div class="panel-header">
                <span id="missingLabel">누락 구간</span>
                <span style="flex:1"></span>
                <button class="panel-action-btn rescan-all" id="rescanAllBtn">전체 재시도</button>
              </div>
              <div class="missing-ranges" id="missingRanges"></div>
            </div>
          </div>
        </div>

    <!-- TOC Edit Modal (fixed overlay, outside main content flow) -->
    <div class="toc-edit-overlay" id="tocEditOverlay" hidden>
      <div class="toc-edit-backdrop" id="tocEditBackdrop"></div>
      <div class="toc-edit-modal">
        <div class="toc-edit-header">
          <span>목차 편집</span>
          <div class="toc-edit-header-actions">
            <button class="toc-edit-add" id="tocAddBtn" title="항목 추가">+ 추가</button>
            <button class="toc-edit-close" id="tocEditClose">✕</button>
          </div>
        </div>
        <div class="toc-edit-list" id="tocEditList"></div>
        <div class="toc-edit-footer">
          <span class="toc-edit-status" id="tocEditStatus"></span>
          <button class="toc-edit-save" id="tocEditSave">저장</button>
        </div>
      </div>
    </div>

        <!-- Page Grid -->
        <div class="grid-section" id="gridSection">
          <div class="grid-header collapsible" id="gridToggle">
            <span id="gridLabel">페이지 맵</span>
            <span class="collapse-icon" id="gridIcon">▾</span>
          </div>
          <div class="grid-filters" id="gridFilters">
            <button class="grid-filter active" data-filter="all">전체</button>
            <button class="grid-filter" data-filter="captured">정상</button>
            <button class="grid-filter" data-filter="suspect">의심</button>
            <button class="grid-filter" data-filter="missing">미완료</button>
            <button class="grid-filter" data-filter="failed">실패</button>
            <span style="flex:1"></span>
            <button class="grid-sel-btn" id="selectAllBtn">전체 선택</button>
            <button class="grid-sel-btn" id="deselectAllBtn">해제</button>
            <button class="grid-batch-btn confirm" id="batchConfirmBtn" hidden>정상 확인</button>
            <button class="grid-batch-btn danger" id="batchDeleteBtn" hidden>삭제</button>
          </div>
          <div class="page-grid" id="pageGrid"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Preview modal -->
  <div class="modal-overlay" id="previewModal" hidden>
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-container">
      <div class="modal-header">
        <span id="modalTitle">페이지 미리보기</span>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <button class="nav-btn" id="prevPage">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="preview-wrapper">
          <img id="previewImg" class="preview-img" src="" alt="">
        </div>
        <button class="nav-btn" id="nextPage">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div class="modal-footer">
        <span id="modalInfo"></span>
        <div class="modal-actions">
          <button class="action-btn small" id="copyPageBtn" title="클립보드에 복사">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            복사
          </button>
          <button class="action-btn small" id="dlPageBtn" title="이미지 다운로드">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            저장
          </button>
          <button class="status-btn ok" id="markNormalBtn" title="정상으로 확인">정상 확인</button>
          <button class="action-btn danger small" id="deletePageBtn">삭제 (재캡처)</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Progress overlay -->
  <div class="progress-overlay" id="progressOverlay" hidden>
    <div class="progress-card">
      <div class="progress-title" id="progressTitle">처리 중...</div>
      <div class="progress-bar large"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">0%</div>
    </div>
  </div>

  <!-- Error dialog -->
  <div class="modal-overlay" id="errorDialog" hidden>
    <div class="modal-backdrop" id="errorBackdrop"></div>
    <div class="error-dialog">
      <div class="error-dialog-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ff3b30" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <div class="error-dialog-title" id="errorTitle">오류 발생</div>
      <div class="error-dialog-message" id="errorMessage"></div>
      <div class="error-dialog-detail" id="errorDetail"></div>
      <div class="error-dialog-actions">
        <button class="action-btn" id="errorCopyBtn">복사</button>
        <button class="action-btn primary" id="errorCloseBtn">닫기</button>
      </div>
    </div>
  </div>

  <script src="lib/jspdf.umd.min.js"></script>
  <script src="lib/jszip.min.js"></script>
  <script src="cache-db.js"></script>
  <script src="utils.js"></script>
  <script src="pdf-utils.js"></script>
  <script src="sessions-inspection.js"></script>
  <script src="sessions-toc-editor.js"></script>
  <script src="sessions-pdf.js"></script>
  <script src="sessions-preview.js"></script>
  <script src="sessions-viewer.js"></script>
  <script src="sessions-grid.js"></script>
  <script src="sessions.js"></script>
</body>
</html>
